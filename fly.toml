app = "tem-website"
primary_region = "syd"

[env]
  HOST = "0.0.0.0"
  PORT = "4321"
  NODE_ENV = "production"

[build]

[http_service]
  internal_port = 4321
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
